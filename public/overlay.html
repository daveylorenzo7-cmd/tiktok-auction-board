<!DOCTYPE html>
<html lang="en">
<head>
  <title>Auction Overlay</title>
  <meta charset="UTF-8">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background: transparent;
      margin: 0;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }
    .overlay-container {
      width: 370px;
      margin: 18px auto;
      background: #181926;
      border-radius: 22px;
      box-shadow: 0 4px 24px #000a;
      padding: 18px 16px 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
      border: none;
      text-align: center;
    }
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin-bottom: 2px;
      background: #232244;
      border-radius: 18px;
      padding: 12px 0 8px 0;
      box-shadow: 0 2px 8px #0003;
    }
    .timer-label {
      font-size: 1.05em;
      color: #a6a8d7;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: 'Poppins', 'Segoe UI Semibold', 'Arial', sans-serif;
    }
    .timer-display {
      font-size: 2.2em;
      font-weight: 900;
      color: #2fffad;
      letter-spacing: 1.5px;
      text-shadow: 0 1px 12px #00ffb055;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
    }
    .info-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #232244;
      border-radius: 12px;
      padding: 7px 12px;
      font-size: 1.05em;
      font-weight: 700;
      margin-bottom: 2px;
      box-shadow: 0 1px 4px #0002;
      gap: 12px;
    }
    .info-label {
      color: #fff;
      font-weight: 700;
      font-family: 'Poppins', 'Segoe UI Semibold', 'Arial', sans-serif;
      text-transform: uppercase;
      font-size: 1em;
      letter-spacing: 0.5px;
    }
    .info-value {
      color: #ffe14a;
      font-weight: 900;
      font-size: 1em;
      padding: 2px 16px;
      border-radius: 8px;
      background: #181926;
      border: none;
      margin-left: 8px;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      letter-spacing: 0.2px;
      box-shadow: 0 1px 4px #0002;
    }
    .info-value.orange {
      background: #ff6a3d;
      color: #fff;
      border: none;
      font-weight: 900;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      letter-spacing: 0.2px;
      border-radius: 8px;
      padding: 2px 16px;
      margin-left: 8px;
      box-shadow: 0 1px 4px #0002;
    }
    .leaderboard-section {
      margin-top: 8px;
      background: #232244;
      border-radius: 18px;
      padding: 10px 8px 8px 8px;
      box-shadow: 0 2px 8px #0003;
    }
    .leaderboard-title {
      color: #a6a8d7;
      font-size: 1.08rem;
      font-weight: 900;
      margin-bottom: 7px;
      text-align: center;
      letter-spacing: 0.5px;
      font-family: 'Poppins', 'Segoe UI Semibold', 'Arial', sans-serif;
      text-shadow: 0 1px 4px #0006;
      text-transform: uppercase;
    }
    #leaderboard {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .leaderboard-entry {
      display: flex;
      align-items: center;
      background: #23233a;
      border-radius: 12px;
      margin-bottom: 4px;
      padding: 6px 10px;
      font-size: 1em;
      font-weight: 700;
      min-height: 32px;
      box-shadow: 0 1px 4px #0002;
    }
    .leaderboard-entry.gold {
      background: linear-gradient(90deg, #ffe14a 0%, #ffb800 100%);
      color: #222;
      border-radius: 12px;
    }
    .leaderboard-entry.silver {
      background: linear-gradient(90deg, #bfc6e6 0%, #e0e3f7 100%);
      color: #222;
      border-radius: 12px;
    }
    .leaderboard-entry.bronze {
      background: linear-gradient(90deg, #ffb86c 0%, #ff9f43 100%);
      color: #222;
      border-radius: 12px;
    }
    .leaderboard-rank {
      width: 22px;
      text-align: center;
      font-size: 1.15em;
      margin-right: 8px;
      font-family: 'Poppins', 'Segoe UI Black', 'Arial Black', Arial, sans-serif;
      letter-spacing: 0.5px;
      font-weight: 900;
    }
    .leaderboard-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      margin: 0 7px 0 1px;
      border: 1.5px solid #444;
      background: #fff;
      box-shadow: 0 1px 4px #0002;
    }
    .leaderboard-name {
      flex: 1;
      margin-left: 2px;
      font-weight: 900;
      font-size: 1.01em;
      font-family: 'Poppins', 'Segoe UI Semibold', 'Arial', sans-serif;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 2px #0004;
      color: #fff;
    }
    .leaderboard-coins {
      font-weight: 900;
      margin-left: 8px;
      font-size: 1.01em;
      color: #ffe14a;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      letter-spacing: 0.2px;
      background: #232244;
      border-radius: 6px;
      padding: 2px 10px;
      box-shadow: 0 1px 4px #0002;
    }
    .participants {
      color: #a6a8d7;
      font-size: 0.92rem;
      margin-top: 4px;
      text-align: right;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="timer-section">
      <div class="timer-label">TIME REMAINING</div>
      <div class="timer-display" id="timer">1:23</div>
    </div>
    <div class="info-bar">
      <span class="info-label">Minimum:</span>
      <span class="info-value" id="min-value">no minimum</span>
    </div>
    <div class="info-bar">
      <span class="info-label">Snipe Delay:</span>
      <span class="info-value orange" id="delay-value">3s</span>
    </div>
    <div class="leaderboard-section">
      <div id="leaderboard"></div>
      <div class="participants" id="participants"></div>
    </div>
  </div>
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function renderLeaderboard(data) {
  const container = document.getElementById("leaderboard");
  container.innerHTML = "";

  data.forEach((user, index) => {
    const div = document.createElement("div");
    div.innerText = `${index + 1}. ${user.name} - ${user.coins}`;
    container.appendChild(div);
  });
}

socket.on("connect", () => {
  console.log("CONNECTED");
  socket.emit("join-auction");
});

socket.on("update", (data) => {
  console.log("UPDATE", data);
  renderLeaderboard(data);
});
</script>
</body>
