<!DOCTYPE html>
<html lang="en">
<head>
  <title>Auction Overlay</title>
  <meta charset="UTF-8">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
body {
  background: radial-gradient(circle at top, #1f1c3d, #0d0b1f);
  font-family: Arial, sans-serif;
  color: white;
}

/* Card container */
.container {
  background: linear-gradient(145deg, #1e1b3a, #15122b);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6),
              inset 0 1px 0 rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
}

/* Timer */
.timer {
  background: linear-gradient(135deg, #00f5c4, #00b3ff);
  color: #001a1a;
  font-weight: 800;
  font-size: 42px;
  border-radius: 16px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,255,200,0.5);
}

/* Leaderboard rows */
.leaderboard-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding: 12px;
  border-radius: 14px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  transition: all 0.3s ease;
}

.leaderboard-item:hover {
  transform: scale(1.02);
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

/* Top 3 styles */
.first {
  background: linear-gradient(135deg, #ffd700, #ffb300);
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

.second {
  background: linear-gradient(135deg, #c0c0c0, #9e9e9e);
}

.third {
  background: linear-gradient(135deg, #ff9f43, #ff6f00);
}

/* Coins badge */
.coins {
  background: linear-gradient(135deg, #111, #222);
  border-radius: 10px;
  padding: 6px 10px;
  box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
}
</style>
</head>
<body>
  <div class="container">
    <div class="timer" id="timer">0:00</div>
    <div id="leaderboard"></div>
  </div>
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// Timer logic
let timerSeconds = 120;
const timerDisplay = document.getElementById('timer');
let timerInterval = null;

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 120;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerDisplay.textContent = "0:00";
    }
  }, 1000);
}

function updateTimerDisplay() {
  const min = Math.floor(timerSeconds / 60);
  const sec = timerSeconds % 60;
  timerDisplay.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
}

function renderLeaderboard(data) {
  const container = document.getElementById("leaderboard");
  container.innerHTML = "";

  data.forEach((user, index) => {
    const div = document.createElement("div");

    let positionClass = "";
    if (index === 0) positionClass = "first";
    else if (index === 1) positionClass = "second";
    else if (index === 2) positionClass = "third";

    div.className = "leaderboard-item " + positionClass;

    div.innerHTML = `
      <span>${index + 1}. ${user.name}</span>
      <span class="coins">${user.coins} 🪙</span>
    `;

    container.appendChild(div);
  });
}

socket.on("connect", () => {
  console.log("CONNECTED");
  socket.emit("join-auction");
  startTimer();
});

socket.on("update", (data) => {
  console.log("UPDATE", data);
  renderLeaderboard(data);
});
</script>
</body>
