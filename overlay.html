
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Overlay Timer</title>
	<style>
		body {
			background: transparent;
			margin: 0;
			font-family: 'Inter', Arial, sans-serif;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}
		.timer-remaining {
			font-size: 4em;
			font-weight: 800;
			color: #00ffb0;
			letter-spacing: 2px;
			text-shadow: 0 2px 12px #00ffb055;
			background: rgba(24,26,32,0.7);
			border-radius: 16px;
			padding: 0.2em 1.2em;
		}
	</style>
</head>
<body>
	<div id="connect-bar" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
		<input id="username-input" type="text" placeholder="Enter your TikTok username" style="padding:10px 18px;font-size:1.2em;border-radius:8px;border:none;outline:none;max-width:320px;width:100%;text-align:center;">
		<button id="connect-btn" style="padding:10px 24px;font-size:1.1em;border-radius:8px;border:none;background:#00f2ea;color:#23243a;font-weight:700;cursor:pointer;">Connect</button>
	</div>
	<div class="timer-remaining" id="timer" style="display:none;">2:00</div>
	<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
	<script>
		let socket = null;
		let joined = false;
		document.getElementById('connect-btn').onclick = function() {
			const username = document.getElementById('username-input').value.trim();
			if (!username) {
				alert('Please enter your TikTok username.');
				return;
			}
			if (joined) return;
			joined = true;
			document.getElementById('connect-bar').style.display = 'none';
			document.getElementById('timer').style.display = '';
			socket = io({ transports: ['websocket'] });
			socket.emit('join', username);
			socket.on('timer-update', (data) => {
				if (!data) return;
				const min = Math.floor(data.time / 60);
				const sec = data.time % 60;
				document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
			});
		};
	</script>
</body>
</html>
